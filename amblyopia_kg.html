        <style type="text/css">

             #mynetwork {
                 width: 100%;

    <body>
        <div class="card" style="width: 100%">
            
            
            <div id="mynetwork" class="card-body"></div>
        </div>

        
        

        <script type="text/javascript">

              // initialize global variables.
              var edges;
              var nodes;
              var allNodes;
              var allEdges;
              var nodeColors;
              var originalNodes;
              var network;
              var container;
              var options, data;
              var filter = {
                  item : '',
                  property : '',
                  value : []
              };

              

              

              // This method is responsible for drawing the graph, returns the drawn network
              function drawGraph() {
                  var container = document.getElementById('mynetwork');

                  

                  // parsing and collecting nodes and edges from the python
                  nodes = new vis.DataSet([{"color": "#FFD966", "id": "TYPE::Diagnosis", "label": "Diagnosis", "shape": "box"}, {"color": "#FFD966", "id": "TYPE::Treatment", "label": "Treatment", "shape": "box"}, {"color": "#9DC3E6", "id": "DiagAmblyopia", "label": "Amblyopia", "shape": "ellipse", "title": "DiagAmblyopia\nType: Diagnosis"}, {"color": "#9DC3E6", "id": "DiagAnisometropicAmblyopia", "label": "Anisometropic Amblyopia", "shape": "ellipse", "title": "DiagAnisometropicAmblyopia\nType: Diagnosis"}, {"color": "#9DC3E6", "id": "DiagBilateralIsoametropicAmblyopia", "label": "Bilateral Isoametropic Amblyopia", "shape": "ellipse", "title": "DiagBilateralIsoametropicAmblyopia\nType: Diagnosis"}, {"color": "#9DC3E6", "id": "DiagDeprivationalAmblyopia", "label": "Deprivational Amblyopia", "shape": "ellipse", "title": "DiagDeprivationalAmblyopia\nType: Diagnosis"}, {"color": "#9DC3E6", "id": "DiagMixedMechanismAmblyopia", "label": "Mixed Mechanism Amblyopia", "shape": "ellipse", "title": "DiagMixedMechanismAmblyopia\nType: Diagnosis"}, {"color": "#9DC3E6", "id": "DiagOtherAmblyopia", "label": "Other Amblyopia", "shape": "ellipse", "title": "DiagOtherAmblyopia\nType: Diagnosis"}, {"color": "#9DC3E6", "id": "DiagStrabismicAmblyopia", "label": "Strabismic Amblyopia", "shape": "ellipse", "title": "DiagStrabismicAmblyopia\nType: Diagnosis"}, {"color": "#9DC3E6", "id": "TreatContactLensCorrection", "label": "Contact Lens Correction", "shape": "ellipse", "title": "TreatContactLensCorrection\nType: Treatment"}, {"color": "#9DC3E6", "id": "TreatFullCyclopegicCorrection", "label": "Full Cyclopegic Correction", "shape": "ellipse", "title": "TreatFullCyclopegicCorrection\nType: Treatment"}, {"color": "#9DC3E6", "id": "TreatOpticalCorrection", "label": "Optical Correction", "shape": "ellipse", "title": "TreatOpticalCorrection\nType: Treatment"}, {"color": "#9DC3E6", "id": "TreatPatching", "label": "Patching", "shape": "ellipse", "title": "TreatPatching\nType: Treatment"}, {"color": "#9DC3E6", "id": "TreatPatching2hDay", "label": "Patching 2h/day", "shape": "ellipse", "title": "TreatPatching2hDay\nType: Treatment"}, {"color": "#9DC3E6", "id": "TreatPatching6hDay", "label": "Patching 6h/day", "shape": "ellipse", "title": "TreatPatching6hDay\nType: Treatment"}, {"color": "#9DC3E6", "id": "TreatPatchingFullTime", "label": "Patching full time", "shape": "ellipse", "title": "TreatPatchingFullTime\nType: Treatment"}]);
                  edges = new vis.DataSet([{"arrows": "to", "from": "DiagAnisometropicAmblyopia", "label": "IS_A", "to": "DiagAmblyopia"}, {"arrows": "to", "from": "DiagBilateralIsoametropicAmblyopia", "label": "IS_A", "to": "DiagAmblyopia"}, {"arrows": "to", "from": "DiagDeprivationalAmblyopia", "label": "IS_A", "to": "DiagAmblyopia"}, {"arrows": "to", "from": "DiagMixedMechanismAmblyopia", "label": "IS_A", "to": "DiagAmblyopia"}, {"arrows": "to", "from": "DiagOtherAmblyopia", "label": "IS_A", "to": "DiagAmblyopia"}, {"arrows": "to", "from": "DiagStrabismicAmblyopia", "label": "IS_A", "to": "DiagAmblyopia"}, {"arrows": "to", "from": "TreatContactLensCorrection", "label": "IS_A", "to": "TreatOpticalCorrection"}, {"arrows": "to", "from": "TreatFullCyclopegicCorrection", "label": "IS_A", "to": "TreatOpticalCorrection"}, {"arrows": "to", "from": "TreatPatching2hDay", "label": "IS_A", "to": "TreatPatching"}, {"arrows": "to", "from": "TreatPatching6hDay", "label": "IS_A", "to": "TreatPatching"}, {"arrows": "to", "from": "TreatPatchingFullTime", "label": "IS_A", "to": "TreatPatching"}, {"arrows": "to", "from": "DiagAmblyopia", "label": "HAS_TYPE", "to": "TYPE::Diagnosis"}, {"arrows": "to", "from": "TreatOpticalCorrection", "label": "HAS_TYPE", "to": "TYPE::Treatment"}, {"arrows": "to", "from": "TreatPatching", "label": "HAS_TYPE", "to": "TYPE::Treatment"}]);

                  nodeColors = {};
                  allNodes = nodes.get({ returnType: "Object" });
                  for (nodeId in allNodes) {
                    nodeColors[nodeId] = allNodes[nodeId].color;
                  }
                  allEdges = edges.get({ returnType: "Object" });
                  // adding nodes and edges to the graph
                  data = {nodes: nodes, edges: edges};

                  var options = {
    "configure": {
        "enabled": false
    },
    "edges": {
        "color": {
            "inherit": true
        },
        "smooth": {
            "enabled": true,
            "type": "dynamic"
        }
    },
    "interaction": {
        "dragNodes": true,
        "hideEdgesOnDrag": false,
        "hideNodesOnDrag": false
    },
    "physics": {
        "enabled": true,
        "forceAtlas2Based": {
            "avoidOverlap": 0,
            "centralGravity": 0.01,
            "damping": 0.4,
            "gravitationalConstant": -50,
            "springConstant": 0.08,
            "springLength": 100
        },
        "solver": "forceAtlas2Based",
        "stabilization": {
            "enabled": true,
            "fit": true,
            "iterations": 1000,
            "onlyDynamicEdges": false,
            "updateInterval": 50
        }
    }
};

                  


                  

                  network = new vis.Network(container, data, options);

                  

                  

                  


                  

                  return network;

              }
              drawGraph();
        </script>
